<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Danh sách chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div class="chat-sidebar">


    <div class="toolbar">
        <button class="tool-btn" type="button" id="btn-refresh">↻ Làm mới</button>
<!--        <button class="tool-btn" type="button" id="btn-new-chat">＋ Tạo cuộc trò chuyện</button>-->
    </div>

    <!-- Ô tìm kiếm -->
    <div class="search-box">
        <input id="searchInput" type="text" class="form-control form-control-sm search-input"
               placeholder="Tìm kiếm bạn bè hoặc nhóm..."/>
    </div>

    <!-- Danh sách chat -->
    <div id="chatList" class="chat-list"></div>
</div>

<!-- SockJS + STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    const USER_ID =  null ;
    const API_LIST_URL = (q='') => `/chat/list/${USER_ID}` + (q ? `?q=${encodeURIComponent(q)}` : '');

    let stompClient = null;
    let items = []; // cache hiện tại

    // ====== Helpers ======
    const formatTime = (isoStr) => {
        if (!isoStr) return '';
        // isoStr có thể đã là Date nếu backend trả LocalDateTime serialized; xử lý nhẹ
        const d = new Date(isoStr);
        if (Number.isNaN(d.getTime())) return '';
        // HH:mm hoặc hôm nay/qua hôm qua tùy ý — giữ đơn giản:
        return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    };

    const initials = (title) => {
        if (!title) return '?';
        return title.trim().split(/\s+/).slice(0,2).map(s => s[0]).join('').toUpperCase();
    };

    const renderList = (data) => {
        const wrap = document.getElementById('chatList');
        wrap.innerHTML = '';
        if (!data || data.length === 0) {
            wrap.innerHTML = `<div class="text-center text-secondary p-3">Không có cuộc trò chuyện nào</div>`;
            return;
        }

        data.forEach(it => {
            const unread = (it.unreadCount || 0) > 0;

            const el = document.createElement('div');
            el.className = 'chat-item';
            el.dataset.cid = it.conversationId;

            el.innerHTML = `
        <div class="avatar">${initials(it.title)}</div>
        <div class="chat-meta">
          <h6 class="chat-title ${unread ? 'unread' : ''}">
            ${it.title || '(Không tên)'}
          </h6>
          <p class="chat-preview">
            ${it.lastMessagePreview ? it.lastMessagePreview : (it.type === 'group' ? 'Nhóm mới' : 'Bắt đầu cuộc trò chuyện')}
          </p>
        </div>
        <div class="chat-right">
          <span class="time">${formatTime(it.lastMessageTime)}</span>
          ${ unread ? `<span class="badge-unread">${it.unreadCount}</span>` : '' }
        </div>
      `;

            el.addEventListener('click', () => {
                // TODO: chuyển sang trang chi tiết chat, ví dụ:
                // window.location.href = `/chat/${it.conversationId}`;
                console.log('open conversation', it.conversationId);
            });

            wrap.appendChild(el);
        });
    };

    const sortByLastMessage = (arr) => {
        return arr.slice().sort((a,b) => {
            const ta = a.lastMessageTime ? new Date(a.lastMessageTime).getTime() : 0;
            const tb = b.lastMessageTime ? new Date(b.lastMessageTime).getTime() : 0;
            return tb - ta;
        });
    };

    const fetchList = async (q='') => {
        try {
            const res = await fetch(API_LIST_URL(q));
            if (!res.ok) throw new Error('Fetch list failed');
            const data = await res.json();
            items = sortByLastMessage(Array.isArray(data) ? data : (data.content || [])); // hỗ trợ Page hoặc List
            renderList(items);
        } catch (e) {
            console.error(e);
        }
    };

    // Đẩy 1 conversation lên đầu khi có tin mới (client-side)
    const bumpConversationTop = (conversationId) => {
        const idx = items.findIndex(i => String(i.conversationId) === String(conversationId));
        if (idx >= 0) {
            // Cập nhật lastMessageTime tạm thời cho mượt (hoặc refetch lại từ API)
            items[idx].lastMessageTime = new Date().toISOString();
            // Tăng unread
            items[idx].unreadCount = (items[idx].unreadCount || 0) + 1;

            // Move lên đầu
            const [spliced] = items.splice(idx,1);
            items.unshift(spliced);
            renderList(items);
        } else {
            // Chưa có trong cache → refetch để lấy mới
            fetchList(document.getElementById('searchInput').value.trim());
        }
    };

    // ====== STOMP Socket ======
    const connectSocket = () => {
        if (!USER_ID) {
            console.warn('USER_ID chưa được gán vào template.');
            return;
        }
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        // tắt log nếu ồn
        stompClient.debug = null;

        stompClient.connect({}, () => {
            // ví dụ server publish tới /topic/chat-list/{userId} khi có tin mới
            const destination = `/topic/chat-list/${USER_ID}`;
            stompClient.subscribe(destination, (message) => {
                try {
                    const payload = JSON.parse(message.body);
                    // server có thể gửi { conversationId: 123 } như ChatListUpdateEvent
                    if (payload && payload.conversationId) {
                        bumpConversationTop(payload.conversationId);
                    } else {
                        // fallback: refetch toàn bộ
                        fetchList(document.getElementById('searchInput').value.trim());
                    }
                } catch (e) {
                    // nếu không phải JSON, refetch
                    fetchList(document.getElementById('searchInput').value.trim());
                }
            });
        }, (err) => {
            console.error('STOMP error', err);
            // thử reconnect nhẹ sau 3s
            setTimeout(connectSocket, 3000);
        });
    };

    // ====== Search debounce ======
    const debounce = (fn, delay=300) => {
        let t = null;
        return (...args) => {
            clearTimeout(t);
            t = setTimeout(() => fn.apply(null, args), delay);
        };
    };

    const onSearch = debounce((e) => {
        const q = e.target.value.trim();
        fetchList(q);
    }, 300);

    // ====== Actions ======
    document.getElementById('searchInput').addEventListener('input', onSearch);
    document.getElementById('btn-refresh').addEventListener('click', () => {
        fetchList(document.getElementById('searchInput').value.trim());
    });
    document.getElementById('btn-new-chat').addEventListener('click', () => {
        // TODO: mở modal tạo nhóm / tạo chat 1-1
        alert('Chức năng tạo cuộc trò chuyện (TODO)');
    });

    // ====== Init ======
    (function init() {
        fetchList('');
        connectSocket();
    })();
</script>
</body>
</html>
