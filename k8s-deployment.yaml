
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webchat-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webchat
  template:
    metadata:
      labels:
        app: webchat
    spec:
      containers:
      - name: webchat-container
        image: vannguyen23/webchat-backend:v14
        ports:
        - containerPort: 8081
        # Cấu hình biến môi trường 
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5432/webchat" 
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "sa123"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092" 
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        - name: SPRING_ELASTICSEARCH_URIS
          value: "http://elasticsearch-service:9200"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-service"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"

---

# Mở cổng 
apiVersion: v1
kind: Service
metadata:
  name: webchat-service
spec:
  type: NodePort #hoặc LoadBalancer
  selector:
    app: webchat
  ports:
    - protocol: TCP
      port: 80       # Cổng bên ngoài 
      targetPort: 8081 # Cổng của Container Spring Boot
      nodePort: 30001